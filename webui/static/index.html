<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factory Layout WebUI</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>Factory Layout WebUI</h1>
            <div class="session-info">
                <span id="session-id">No session</span>
                <span id="connection-status" class="status-disconnected">●</span>
                <button class="theme-toggle" id="theme-toggle" title="Toggle dark/light mode">🌙</button>
            </div>
        </header>

        <div class="main-content">
            <!-- Left Panel: Controls -->
            <aside class="control-panel">
                <section class="panel-section">
                    <h3>Session</h3>
                    <div class="form-group">
                        <label>Environment Config:</label>
                        <select id="env-config">
                            <option value="converters/test.json">converters/test.json</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Collision Check:</label>
                        <select id="collision-check">
                            <option value="auto">Auto</option>
                            <option value="prefixsum">Prefix Sum</option>
                            <option value="conv">Conv</option>
                        </select>
                    </div>
                    <div class="form-group with-settings">
                        <label>Wrapper:</label>
                        <div class="select-with-btn">
                            <select id="wrapper-mode">
                                <option value="greedyv3">Greedy V3</option>
                                <option value="greedyv2">Greedy V2</option>
                                <option value="greedy">Greedy V1</option>
                                <option value="alphachip">AlphaChip</option>
                                <option value="maskplace">MaskPlace</option>
                            </select>
                            <button type="button" class="btn-settings" data-panel="wrapper">⚙️</button>
                        </div>
                    </div>
                    <div class="form-group with-settings">
                        <label>Agent:</label>
                        <div class="select-with-btn">
                            <select id="agent-mode">
                                <option value="greedy">Greedy</option>
                                <option value="alphachip">AlphaChip</option>
                                <option value="maskplace">MaskPlace</option>
                            </select>
                            <button type="button" class="btn-settings" data-panel="agent">⚙️</button>
                        </div>
                    </div>
                    <div class="form-group with-settings">
                        <label>Search:</label>
                        <div class="select-with-btn">
                            <select id="search-mode">
                                <option value="none">None</option>
                                <option value="mcts">MCTS</option>
                                <option value="beam">Beam Search</option>
                            </select>
                            <button type="button" class="btn-settings" data-panel="search">⚙️</button>
                        </div>
                    </div>
                    
                    <button id="btn-create" class="btn btn-primary">Create Session</button>
                    <div id="session-message" class="session-message"></div>
                </section>

                <section class="panel-section">
                    <h3>Actions</h3>
                    <div class="btn-group">
                        <button id="btn-reset" class="btn" disabled>Reset</button>
                        <button id="btn-undo" class="btn" disabled>Undo</button>
                        <button id="btn-redo" class="btn" disabled>Redo</button>
                    </div>
                </section>

                <section class="panel-section">
                    <h3>Search</h3>
                    <div class="form-group">
                        <label>Update Interval:</label>
                        <input type="number" id="search-interval" value="10" min="1" max="100">
                    </div>
                    <button id="btn-search" class="btn btn-secondary" disabled>Run Search</button>
                    <div id="search-progress" class="progress-bar" style="display: none;">
                        <div class="progress-fill"></div>
                        <span class="progress-text">0%</span>
                    </div>
                </section>

                <section class="panel-section">
                    <h3>Layers</h3>
                    <div class="checkbox-group">
                        <label class="layer-toggle">
                            <input type="checkbox" id="show-candidates" checked>
                            <span class="layer-color" style="background: #2ca02c;"></span>
                            Candidates
                        </label>
                        <label class="layer-toggle">
                            <input type="checkbox" id="show-flow" checked>
                            <span class="layer-color" style="background: #1f77b4;"></span>
                            Flow
                        </label>
                        <label class="layer-toggle">
                            <input type="checkbox" id="show-forbidden">
                            <span class="layer-color" style="background: #d62728; opacity: 0.3;"></span>
                            Forbidden Area
                        </label>
                        <label class="layer-toggle">
                            <input type="checkbox" id="show-constraint-zones">
                            <span class="layer-color" style="background: #1e90ff; opacity: 0.3;"></span>
                            Constraint Zones
                        </label>
                    </div>
                </section>

                <section class="panel-section">
                    <h3>Display</h3>
                    <div class="checkbox-group">
                        <label><input type="checkbox" id="show-scores" checked> Score Colors</label>
                        <label><input type="checkbox" id="show-visits"> Visit Size</label>
                        <label><input type="checkbox" id="show-labels" checked> Labels</label>
                        <label><input type="checkbox" id="show-grid"> Grid Lines</label>
                    </div>
                </section>
            </aside>

            <!-- Center: Canvas -->
            <main class="canvas-area">
                <canvas id="layout-canvas"></canvas>
                <div class="canvas-overlay">
                    <div id="hover-info" class="hover-info" style="display: none;"></div>
                </div>
            </main>

            <!-- Right Panel: Info -->
            <aside class="info-panel">
                <section class="panel-section">
                    <h3>State</h3>
                    <div id="state-info">
                        <div class="info-row"><span>Step:</span><span id="info-step">-</span></div>
                        <div class="info-row"><span>Cost:</span><span id="info-cost">-</span></div>
                        <div class="info-row"><span>Value:</span><span id="info-value">-</span></div>
                        <div class="info-row"><span>Remaining:</span><span id="info-remaining">-</span></div>
                        <div class="info-row"><span>Current:</span><span id="info-current">-</span></div>
                    </div>
                </section>

                <section class="panel-section">
                    <h3>Candidates <span id="candidate-count">(0)</span></h3>
                    <div class="candidate-header">
                        <span class="col-index">#</span>
                        <span class="col-pos">Pos</span>
                        <span class="col-q">Q</span>
                        <span class="col-p">P</span>
                        <span class="col-n">N</span>
                    </div>
                    <div id="candidate-list" class="candidate-list"></div>
                </section>
            </aside>
        </div>
    </div>

    <!-- Settings Side Panel -->
    <div id="settings-panel" class="settings-panel">
        <div class="settings-header">
            <h3 id="settings-title">Settings</h3>
            <button id="settings-close" class="btn-close">✕</button>
        </div>
        <div id="settings-content" class="settings-content">
            <!-- Wrapper Settings (동적 생성) -->
            <div id="panel-wrapper" class="panel-content" style="display: none;">
                <h4 id="wrapper-title">Wrapper Settings</h4>
                <div id="wrapper-params-container"></div>
            </div>
            
            <!-- Agent Settings (동적 생성) -->
            <div id="panel-agent" class="panel-content" style="display: none;">
                <h4 id="agent-title">Agent Settings</h4>
                <div id="agent-params-container"></div>
            </div>
            
            <!-- Search Settings (동적 생성) -->
            <div id="panel-search" class="panel-content" style="display: none;">
                <h4 id="search-title">Search Settings</h4>
                <div id="search-params-container"></div>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
